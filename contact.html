<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. Tushar Aditya | Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #121212;
            --neon-blue: #00D4FF;
            --text-white: #ffffff;
            --text-gray: #b0b0b0;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            line-height: 1.6;
        }
        a { text-decoration: none; color: inherit; }
        
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo { font-size: 24px; font-weight: 700; color: var(--neon-blue); }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { font-weight: 500; transition: 0.3s; }
        .nav-links a:hover { color: var(--neon-blue); }
        .nav-links a.active { color: var(--neon-blue); }

        .container { padding: 150px 10% 80px; }
        .section-title { font-size: 45px; text-align: center; margin-bottom: 50px; }
        .section-title span { color: var(--neon-blue); }

        .contact-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Contact Form */
        .contact-form {
            background: rgba(255,255,255,0.05);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .form-group { margin-bottom: 25px; }
        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: var(--text-gray);
            font-size: 14px;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: var(--text-white);
            font-family: inherit;
            font-size: 16px;
            transition: 0.3s;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0,212,255,0.3);
            background: rgba(255,255,255,0.15);
        }
        .form-group textarea { height: 150px; resize: none; }
        .submit-btn {
            width: 100%;
            padding: 18px;
            background: var(--neon-blue);
            color: var(--bg-dark);
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
        }
        .submit-btn:hover {
            background: #fff;
            box-shadow: 0 0 30px rgba(0,212,255,0.6);
            transform: translateY(-3px);
        }

        /* Contact Info */
        .contact-info h2 { font-size: 35px; margin-bottom: 20px; }
        .contact-info p { color: var(--text-gray); font-size: 18px; margin-bottom: 40px; }
        .info-item {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .info-icon {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .info-text h3 { font-size: 18px; margin-bottom: 5px; }
        .info-text p { color: var(--text-gray); font-size: 16px; margin-bottom: 0; }

        /* Social Links */
        .social-section { margin-top: 50px; }
        .social-section h3 { margin-bottom: 20px; }
        .social-links { display: flex; gap: 15px; }
        .social-icon {
            width: 55px;
            height: 55px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .social-icon:hover {
            background: var(--neon-blue);
            color: var(--bg-dark);
            box-shadow: 0 0 25px rgba(0,212,255,0.6);
            transform: translateY(-5px);
        }

        footer { padding: 30px; text-align: center; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 80px; }
        footer p { color: var(--text-gray); }

        @media (max-width: 768px) {
            .contact-wrapper { grid-template-columns: 1fr; }
            .navbar { padding: 20px; }
            .nav-links { display: none; }
        }
    </style>
</head>
